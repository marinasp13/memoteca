                <div class="form_adicionar_pensamento_botoes">
                    <button class="form_adicionar_pensamento_botoes_btn" id="salvar_btn">Salvar</button>
                    <button class="form_adicionar_pensamento_botoes_btn" id="cancelar_btn">Cancelar</button>
                </div>
            </form>
            <button id="form_adicionar_btn">Adicionar pensamentos</button>
